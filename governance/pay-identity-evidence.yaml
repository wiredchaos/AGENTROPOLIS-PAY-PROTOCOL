risks:
  - id: R1
    severity: P0
    summary: Repository may be mistaken for root identity authority because README lists identity in the trust surface.
  - id: R2
    severity: P0
    summary: principal_id/agent_id/delegate_id/decided_by are free strings unbound to an Identity Authority.
  - id: R3
    severity: P0
    summary: Fail-closed revocation and self-approval bans exist only as prose; no runtime enforcement.
  - id: R4
    severity: P1
    summary: Local receipt schema is not agentropolis.receipt.v1; audit.v1 and revocation.v1 absent.
  - id: R5
    severity: P1
    summary: Spending authority incomplete (no daily/chain/destination matrices; empty merchant allowlist semantics unspecified).
  - id: R6
    severity: P2
    summary: README maps authorization-flow.md and lifecycle.md that are missing from the tree.
  - id: R7
    severity: P2
    summary: Approval signature field has no algorithm, issuer, or audience constraints.
  - id: R8
    severity: P3
    summary: Schema $id host is agentropolis.example placeholder.

